version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chantier_db
    environment:
      POSTGRES_USER: chantier
      POSTGRES_PASSWORD: chantier_pass
      POSTGRES_DB: chantier_rentable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chantier -d chantier_rentable"]
      interval: 5s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng
    container_name: chantier_searxng
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chantier_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chantier:chantier_pass@postgres:5432/chantier_rentable
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      CORS_ORIGINS_STR: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chantier_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
